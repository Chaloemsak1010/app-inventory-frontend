name: Example Pipeline

#we can set conditins.
on:
  workflow_dispatch:

#  Global variables
env:
  APP_NAME: my-app
  NODE_VERSION: 20
  MY_VARIABLE: ${{ vars.VARIABLE }}
# Every job and step can access these global variables, but secrets are masked in logs and not exposed to pull requests from forks.

jobs:
  build:
    runs-on: ubuntu-latest

    #  Job-level variables
    env:
      MY_MSG: ${{vars.HI}}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Show global + job env
        run: |
          echo "App: $APP_NAME"
          echo "Node: $NODE_VERSION"
          echo "My Environment Variable: $MY_VARIABLE"
          echo "My Job Message: $MY_MSG"

      - name: Use secret (step-level)
        env:
           MY_SECRET: ${{ secrets.MY_SECRET }}
        run: |
          echo "Using secret safely"
          echo "Secret is set, but won't be printed in logs"
          # You can use $MY_SECRET here without exposing it in logs 


